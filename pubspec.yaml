name: nearent
description: "Nearend - Local community marketplace for buying, renting, and exchanging items nearby."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # Google Sign-In
  google_sign_in: ^6.2.1

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.5

  # Routing
  go_router: ^14.3.0

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.7.0

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Location & Maps
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0

  # Notifications
  flutter_local_notifications: ^18.0.0

  # UI
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  photo_view: ^0.15.0
  carousel_slider: ^5.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.1
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  share_plus: ^10.0.3
  qr_flutter: ^4.1.0
  flutter_animate: ^4.5.0

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.5.7
  json_serializable: ^6.7.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
